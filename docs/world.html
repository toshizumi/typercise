<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>世界の Typercizer — Typercise</title>
  <meta name="description" content="あえて打ち続ける Typercizer たちの集合的な打鍵ログ。">
  <link rel="stylesheet" href="style.css">
  <style>
    .world-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      max-width: 760px;
      margin: 48px auto 0;
      text-align: left;
    }
    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 18px 20px;
    }
    .stat-card .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dark-muted);
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    .stat-card .unit {
      font-size: 13px;
      color: var(--dark-muted);
      margin-top: 2px;
    }
    .rank-block {
      max-width: 760px;
      margin: 56px auto 0;
      text-align: left;
    }
    .rank-heading {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 12px;
    }
    .rank-list {
      list-style: none;
      padding: 0;
      margin: 0;
      counter-reset: r;
    }
    .rank-list li {
      counter-increment: r;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-variant-numeric: tabular-nums;
    }
    .rank-list li::before {
      content: counter(r);
      color: var(--dark-muted);
      font-size: 13px;
      text-align: right;
    }
    .rank-list .nm { font-size: 14px; }
    .rank-list .vl { font-size: 14px; font-weight: 600; }
    .empty { color: var(--dark-muted); font-size: 13px; padding: 8px 0; }
    .as-of {
      text-align: center;
      color: var(--dark-muted);
      font-size: 12px;
      margin-top: 32px;
    }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a class="brand" href="index.html" style="color:inherit;text-decoration:none;">Typercise</a>
    <a class="nav-link" href="https://github.com/toshizumi/typercise">GitHub</a>
  </div>
</nav>

<section class="hero pane dark">
  <div class="pane-inner">
    <h1 class="display reveal">世界の Typercizer</h1>
    <p class="lead reveal">あえて打ち続ける仲間の、今日の集計。</p>

    <div class="world-grid reveal" id="grid">
      <div class="stat-card">
        <div class="label">参加者（直近7日)</div>
        <div class="value" id="participants">—</div>
      </div>
      <div class="stat-card">
        <div class="label">今日の総打鍵</div>
        <div class="value" id="today_keys">—</div>
        <div class="unit">≈ <span id="today_kcal">—</span> kcal</div>
      </div>
      <div class="stat-card">
        <div class="label">累計</div>
        <div class="value" id="all_keys">—</div>
        <div class="unit">打鍵</div>
      </div>
    </div>

    <div class="rank-block reveal">
      <div class="rank-heading">今日の打鍵 TOP10</div>
      <ol class="rank-list" id="top_keys"><li class="empty">読み込み中…</li></ol>
    </div>
    <div class="rank-block reveal">
      <div class="rank-heading">今日のピーク kpm TOP10</div>
      <ol class="rank-list" id="top_peak"><li class="empty">読み込み中…</li></ol>
    </div>

    <p class="as-of" id="as_of"></p>
  </div>
</section>

<footer>
  <div class="foot-inner">
    <span>© 2026 toshizumi</span>
    <span class="sep">·</span>
    <a href="index.html">トップ</a>
    <span class="sep">·</span>
    <a href="privacy.html">プライバシー</a>
    <span class="sep">·</span>
    <a href="https://github.com/toshizumi/typercise">GitHub</a>
  </div>
</footer>

<script>
const API = "https://typercise-api.typersize.workers.dev/api/v1/world";
const fmt = n => Number(n || 0).toLocaleString("ja-JP");
const fmtFloat = n => Number(n || 0).toLocaleString("ja-JP", { maximumFractionDigits: 1 });

function renderRanking(id, rows, valKey, suffix) {
  const ol = document.getElementById(id);
  if (!rows || rows.length === 0) {
    ol.innerHTML = '<li class="empty">まだ誰もランクインしていません</li>';
    return;
  }
  ol.innerHTML = rows.map(r =>
    `<li><span class="nm">${(r.nickname || "").replace(/[<>&"']/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c]))}</span><span class="vl">${fmt(r[valKey])}${suffix || ""}</span></li>`
  ).join("");
}

(async () => {
  try {
    const r = await fetch(API + "?_=" + Date.now());
    const w = await r.json();
    document.getElementById("participants").textContent = fmt(w.participants_7d);
    document.getElementById("today_keys").textContent = fmt(w.today.keys);
    document.getElementById("today_kcal").textContent = fmtFloat(w.today.kcal);
    document.getElementById("all_keys").textContent = fmt(w.all_time.keys);
    renderRanking("top_keys", w.top_today_keys, "keys", "");
    renderRanking("top_peak", w.top_today_peak_kpm, "peak_kpm", " kpm");
    const d = new Date(w.as_of * 1000);
    document.getElementById("as_of").textContent =
      "更新: " + d.toLocaleString("ja-JP");
  } catch (e) {
    document.getElementById("as_of").textContent = "読み込みに失敗しました";
  }
})();

const els = document.querySelectorAll('.reveal');
const io = new IntersectionObserver(entries => {
  for (const e of entries) {
    if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
  }
}, { threshold: 0.1 });
els.forEach(el => io.observe(el));
</script>

</body>
</html>
